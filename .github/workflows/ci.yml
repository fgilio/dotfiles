name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: bash bin/lint

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tests
        env:
          DOTFILES: ${{ github.workspace }}
        run: bash bin/rm-test
