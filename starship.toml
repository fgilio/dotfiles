# Minimal Starship configuration
# Two-line prompt: context (dir, git, duration) on top, input character below

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 500
format = "[$duration]($style) "

# Language version modules disabled: each one runs file detection on every
# prompt, and the versions are never useful here (Herd/asdf pin them anyway)
[nodejs]
disabled = true

[php]
disabled = true

[python]
disabled = true

[ruby]
disabled = true

[golang]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[package]
disabled = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"