output:
  - summary
  - failure
  - execution_out

pre-commit:
  commands:
    lint:
      run: bin/lint
    agents-symlinks:
      run: |
        status=0
        for claude in $(find . -name CLAUDE.md -not -path './.git/*' -not -path '*/vendor/*'); do
          dir=$(dirname "$claude")
          agents="$dir/AGENTS.md"
          if [ ! -L "$agents" ]; then
            echo "Missing AGENTS.md symlink for $claude"
            status=1
          elif [ "$(readlink "$agents")" != "CLAUDE.md" ]; then
            echo "AGENTS.md in $dir is not a symlink to CLAUDE.md"
            status=1
          fi
        done
        exit $status

pre-push:
  commands:
    tests:
      run: bin/rm-test
